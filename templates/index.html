<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContentSquare KPI Exporter</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.min.css">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --input-bg: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: .25rem;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: .9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .card h2 {
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    font-size: .8rem;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: .35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .8rem; color: var(--muted); font-weight: 500; }
  input, select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem .8rem;
    color: var(--text);
    font-size: .9rem;
    transition: border-color .2s;
    width: 100%;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .hint { font-size: .7rem; color: var(--muted); }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-top: .5rem;
  }
  .checkbox-row input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    width: 100%;
    padding: .8rem 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(.98); }
  .btn:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-download {
    background: var(--green);
    margin-top: 1rem;
  }
  .btn-download:hover { background: #16a34a; }
  #log-box {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: .75rem;
    line-height: 1.6;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
    color: var(--muted);
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .3rem .8rem;
    border-radius: 20px;
    font-size: .8rem;
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .status.running { background: #1e3a5f; color: #60a5fa; }
  .status.done { background: #14532d; color: #4ade80; }
  .status.error { background: #450a0a; color: #fca5a5; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ts-wrapper { width: 100%; }
  .ts-control {
    background: var(--input-bg) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
    padding: .4rem .6rem !important;
    min-height: 38px !important;
  }
  .ts-control input { color: var(--text) !important; }
  .ts-control .item {
    background: var(--accent) !important;
    color: white !important;
    border: none !important;
    border-radius: 4px !important;
    padding: .15rem .5rem !important;
    font-size: .8rem !important;
  }
  .ts-control .item .remove { color: rgba(255,255,255,.7) !important; border-left-color: rgba(255,255,255,.2) !important; }
  .ts-dropdown {
    background: var(--card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
  }
  .ts-dropdown .option { color: var(--text) !important; }
  .ts-dropdown .option:hover, .ts-dropdown .active { background: var(--accent) !important; color: white !important; }
  .ts-wrapper.focus .ts-control { border-color: var(--accent) !important; box-shadow: none !important; }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <h1>ContentSquare KPI Exporter</h1>
    <button type="button" id="refresh-options-btn"
            style="font-size:.75rem;padding:.35rem .8rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;white-space:nowrap;"
            title="Recharger segments, goals, mappings et page groups depuis l'API">Rafraichir les listes</button>
  </div>
  <p class="subtitle">Configure et lance l'export de tes KPIs en quelques clics.</p>

  <div id="config-form">
    <div class="card">
      <h2>Periode d'analyse</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="start_date">Date de debut</label>
          <input type="date" id="start_date" value="{{ start_date }}">
        </div>
        <div class="form-group">
          <label for="end_date">Date de fin</label>
          <input type="date" id="end_date" value="{{ end_date }}">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Segments</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label for="segment_ids">IDs des segments (la 1ere = reference)</label>
          <select id="segment_ids" multiple placeholder="Rechercher un segment..."></select>
          <span class="hint">La premiere selection sert de reference. Laisser vide pour ignorer.</span>
        </div>
        <div class="form-group full">
          <div class="checkbox-row">
            <input type="checkbox" id="by_device" {% if by_device %}checked{% endif %}>
            <label for="by_device">Analyser par device (desktop / mobile / tablette)</label>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Page Groups</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="mapping_id">Mapping ID</label>
          <select id="mapping_id">
            <option value="{{ mapping_id }}">Chargement...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="page_group_id">Page Group ID</label>
          <select id="page_group_id">
            <option value="">Tous (aucun filtre)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Goals</h2>
      <div class="form-group">
        <label for="goal_ids">Goal IDs</label>
        <select id="goal_ids" multiple placeholder="Rechercher un goal..."></select>
      </div>
    </div>

    <button type="button" class="btn" id="run-btn">Lancer</button>
  </div>

  <div class="card" id="result-card" style="display:none; margin-top:1.5rem;">
    <div id="status-badge"></div>
    <div id="log-box"></div>
    <a id="download-link" href="/download" style="display:none;">
      <button type="button" class="btn btn-download">Telecharger le fichier Excel</button>
    </a>
  </div>
</div>

<script>
var initialMappingId = "{{ mapping_id }}";
var initialPageGroupId = "{{ page_group_id }}";
var initialSegmentIds = [{{ segment_ids_json|safe }}];
var initialGoalIds = [{{ goal_ids_json|safe }}];
</script>
{% raw %}
<script>
var mappingSelect = document.getElementById("mapping_id");
var pageGroupSelect = document.getElementById("page_group_id");
var allPageGroups = [];

// Init Tom Select for segments (multi-select with search)
var segmentsTomSelect = new TomSelect("#segment_ids", {
  plugins: ["remove_button"],
  valueField: "value",
  labelField: "text",
  searchField: ["text"],
  options: [],
  create: false,
  maxOptions: null,
  placeholder: "Rechercher un segment..."
});

// Init Tom Select for goals (multi-select with search)
var goalsTomSelect = new TomSelect("#goal_ids", {
  plugins: ["remove_button"],
  valueField: "value",
  labelField: "text",
  searchField: ["text"],
  options: [],
  create: false,
  maxOptions: null,
  placeholder: "Rechercher un goal..."
});

function populatePageGroups(selectedMappingId) {
  var currentVal = pageGroupSelect.value;
  pageGroupSelect.innerHTML = '<option value="">Tous (aucun filtre)</option>';
  var filtered = allPageGroups.filter(function(pg) {
    return String(pg.mapping_id) === String(selectedMappingId);
  });
  filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
  filtered.forEach(function(pg) {
    var opt = document.createElement("option");
    opt.value = pg.id;
    opt.textContent = pg.name + " - " + pg.id;
    pageGroupSelect.appendChild(opt);
  });
  if (initialPageGroupId) {
    pageGroupSelect.value = initialPageGroupId;
    initialPageGroupId = "";
  } else {
    pageGroupSelect.value = currentVal || "";
  }
}

mappingSelect.addEventListener("change", function() {
  populatePageGroups(mappingSelect.value);
});

function loadOptions(refresh) {
  var url = "/api/options" + (refresh ? "?refresh=1" : "");
  mappingSelect.innerHTML = '<option value="">Chargement...</option>';
  pageGroupSelect.innerHTML = '<option value="">Chargement...</option>';
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) { console.error(data.error); return; }

      // Mappings
      mappingSelect.innerHTML = "";
      data.mappings.sort(function(a, b) { return a.name.localeCompare(b.name); });
      data.mappings.forEach(function(m) {
        var opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.name + " - " + m.id;
        mappingSelect.appendChild(opt);
      });
      if (initialMappingId) {
        mappingSelect.value = initialMappingId;
      }

      // Page groups
      allPageGroups = data.page_groups;
      populatePageGroups(mappingSelect.value);

      // Segments
      if (data.segments) {
        var savedSegments = segmentsTomSelect.items.slice();
        segmentsTomSelect.clear(true);
        segmentsTomSelect.clearOptions();
        data.segments.sort(function(a, b) { return a.name.localeCompare(b.name); });
        data.segments.forEach(function(s) {
          segmentsTomSelect.addOption({ value: String(s.id), text: s.name + " - " + s.id });
        });
        var toSelect = savedSegments.length ? savedSegments : initialSegmentIds.map(String);
        toSelect.forEach(function(v) { segmentsTomSelect.addItem(v, true); });
        segmentsTomSelect.refreshOptions(false);
      }

      // Goals
      if (data.goals) {
        var savedGoals = goalsTomSelect.items.slice();
        goalsTomSelect.clear(true);
        goalsTomSelect.clearOptions();
        data.goals.sort(function(a, b) { return a.name.localeCompare(b.name); });
        data.goals.forEach(function(g) {
          goalsTomSelect.addOption({ value: String(g.id), text: g.name + " - " + g.id });
        });
        var toSelectGoals = savedGoals.length ? savedGoals : initialGoalIds.map(String);
        toSelectGoals.forEach(function(v) { goalsTomSelect.addItem(v, true); });
        goalsTomSelect.refreshOptions(false);
      }
    })
    .catch(function(err) {
      console.error("Erreur chargement options:", err);
      mappingSelect.innerHTML = '<option value="">Erreur de chargement</option>';
    });
}

loadOptions(false);

document.getElementById("refresh-options-btn").addEventListener("click", function() {
  initialMappingId = mappingSelect.value;
  initialPageGroupId = pageGroupSelect.value;
  loadOptions(true);
});

var runBtn = document.getElementById("run-btn");
var resultCard = document.getElementById("result-card");
var statusBadge = document.getElementById("status-badge");
var logBox = document.getElementById("log-box");
var downloadLink = document.getElementById("download-link");

runBtn.addEventListener("click", function() {
  runBtn.disabled = true;
  runBtn.textContent = "Export en cours...";
  resultCard.style.display = "block";
  statusBadge.innerHTML = '<span class="status running"><span class="spinner"></span> Export en cours...</span>';
  logBox.style.display = "block";
  logBox.textContent = "Connexion API en cours...\n";
  downloadLink.style.display = "none";

  var payload = {
    start_date: document.getElementById("start_date").value,
    end_date: document.getElementById("end_date").value,
    segment_ids: segmentsTomSelect.items.join(", "),
    by_device: document.getElementById("by_device").checked,
    page_group_id: document.getElementById("page_group_id").value,
    mapping_id: document.getElementById("mapping_id").value,
    goal_ids: goalsTomSelect.items.join(", ")
  };

  fetch("/run", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.json(); })
  .then(function(result) {
    logBox.textContent = result.log || "(aucun log)";
    if (result.success) {
      statusBadge.innerHTML = '<span class="status done">Export termine avec succes</span>';
      downloadLink.style.display = "block";
    } else {
      statusBadge.innerHTML = '<span class="status error">Erreur</span>';
    }
    runBtn.disabled = false;
    runBtn.textContent = "Lancer";
    logBox.scrollTop = logBox.scrollHeight;
  })
  .catch(function(err) {
    statusBadge.innerHTML = '<span class="status error">Erreur : ' + err.message + '</span>';
    logBox.textContent += "\n" + err.toString();
    runBtn.disabled = false;
    runBtn.textContent = "Lancer";
  });
});
</script>
{% endraw %}
</body>
</html>
