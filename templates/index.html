<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContentSquare KPI Exporter</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --input-bg: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: .25rem;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: .9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .card h2 {
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    font-size: .8rem;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: .35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .8rem; color: var(--muted); font-weight: 500; }
  input, select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem .8rem;
    color: var(--text);
    font-size: .9rem;
    transition: border-color .2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .hint { font-size: .7rem; color: var(--muted); }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-top: .5rem;
  }
  .checkbox-row input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    width: 100%;
    padding: .8rem 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(.98); }
  .btn:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-download {
    background: var(--green);
    margin-top: 1rem;
  }
  .btn-download:hover { background: #16a34a; }
  #log-box {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: .75rem;
    line-height: 1.6;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
    color: var(--muted);
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .3rem .8rem;
    border-radius: 20px;
    font-size: .8rem;
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .status.running { background: #1e3a5f; color: #60a5fa; }
  .status.done { background: #14532d; color: #4ade80; }
  .status.error { background: #450a0a; color: #fca5a5; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>ContentSquare KPI Exporter</h1>
  <p class="subtitle">Configure et lance l'export de tes KPIs en quelques clics.</p>

  <div id="config-form">
    <div class="card">
      <h2>Periode d'analyse</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="start_date">Date de debut</label>
          <input type="date" id="start_date" value="{{ start_date }}">
        </div>
        <div class="form-group">
          <label for="end_date">Date de fin</label>
          <input type="date" id="end_date" value="{{ end_date }}">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Segments</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label for="segment_ids">IDs des segments (la 1ere = reference)</label>
          <input type="text" id="segment_ids" value="{{ segment_ids }}"
                 placeholder="ex: 6383684, 6383688, 6383692">
          <span class="hint">Separes par des virgules. Laisser vide pour ignorer.</span>
        </div>
        <div class="form-group full">
          <div class="checkbox-row">
            <input type="checkbox" id="by_device" {% if by_device %}checked{% endif %}>
            <label for="by_device">Analyser par device (desktop / mobile / tablette)</label>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Page Groups</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="page_group_id">Page Group ID</label>
          <input type="text" id="page_group_id" value="{{ page_group_id }}"
                 placeholder="Optionnel">
        </div>
        <div class="form-group">
          <label for="mapping_id">Mapping ID</label>
          <input type="text" id="mapping_id" value="{{ mapping_id }}">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Goals</h2>
      <div class="form-group">
        <label for="goal_ids">Goal IDs</label>
        <input type="text" id="goal_ids" value="{{ goal_ids }}"
               placeholder="ex: 1816096">
        <span class="hint">Separes par des virgules.</span>
      </div>
    </div>

    <button type="button" class="btn" id="run-btn">Lancer</button>
  </div>

  <div class="card" id="result-card" style="display:none; margin-top:1.5rem;">
    <div id="status-badge"></div>
    <div id="log-box"></div>
    <a id="download-link" href="/download" style="display:none;">
      <button type="button" class="btn btn-download">Telecharger le fichier Excel</button>
    </a>
  </div>
</div>

{% raw %}
<script>
var runBtn = document.getElementById("run-btn");
var resultCard = document.getElementById("result-card");
var statusBadge = document.getElementById("status-badge");
var logBox = document.getElementById("log-box");
var downloadLink = document.getElementById("download-link");

runBtn.addEventListener("click", function() {
  runBtn.disabled = true;
  runBtn.textContent = "Export en cours...";
  resultCard.style.display = "block";
  statusBadge.innerHTML = '<span class="status running"><span class="spinner"></span> Export en cours...</span>';
  logBox.style.display = "block";
  logBox.textContent = "Connexion API en cours...\n";
  downloadLink.style.display = "none";

  var payload = {
    start_date: document.getElementById("start_date").value,
    end_date: document.getElementById("end_date").value,
    segment_ids: document.getElementById("segment_ids").value,
    by_device: document.getElementById("by_device").checked,
    page_group_id: document.getElementById("page_group_id").value,
    mapping_id: document.getElementById("mapping_id").value,
    goal_ids: document.getElementById("goal_ids").value
  };

  fetch("/run", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.json(); })
  .then(function(result) {
    logBox.textContent = result.log || "(aucun log)";
    if (result.success) {
      statusBadge.innerHTML = '<span class="status done">Export termine avec succes</span>';
      downloadLink.style.display = "block";
    } else {
      statusBadge.innerHTML = '<span class="status error">Erreur</span>';
    }
    runBtn.disabled = false;
    runBtn.textContent = "Lancer";
    logBox.scrollTop = logBox.scrollHeight;
  })
  .catch(function(err) {
    statusBadge.innerHTML = '<span class="status error">Erreur : ' + err.message + '</span>';
    logBox.textContent += "\n" + err.toString();
    runBtn.disabled = false;
    runBtn.textContent = "Lancer";
  });
});
</script>
{% endraw %}
</body>
</html>
